{
  "scenario_name": "racetrack",
  "environment": {
    "env_id": "racetrack-v0",
    "render_mode": "rgb_array",
    "config": {
      "observation": {
        "type": "DetailedOccupancyGrid",
        "features": ["presence", "on_lane", "on_road"],
        "grid_size": [[-50, 50], [-12, 12]],
        "grid_step": [1.0, 1.0],
        "absolute": false,
        "align_to_vehicle_axes": true,
        "include_ego_vehicle": true,
        "on_road_mode": "area",
        "on_road_soft_mode": true,
        "presence_subsamples": 5,
        "on_road_subsamples": 3
      },
      "action": {
        "type": "DiscreteAction",
        "longitudinal": true,
        "lateral": true,
        "actions_per_axis": 5,
        "acceleration_range": [-5.0, 5.0],
        "steering_range": [-0.5235987755982988, 0.5235987755982988]
      },
      "simulation_frequency": 15,
      "policy_frequency": 5,
      "duration": 80,
      "collision_reward": -1,
      "lane_centering_cost": 4,
      "lane_centering_reward": 1,
      "action_reward": 0.0,
      "controlled_vehicles": 1,
      "other_vehicles": 1,
      "terminate_off_road": true,
      "terminate_on_finish": true,
      "finish_laps": 1,
      "finish_line_segment": ["a", "b"],
      "finish_line_longitudinal": 0.0
    }
  },
  "presets": {
    "self_play": {
      "stack": {
        "history_length": 5,
        "append_raw_ego_speed_plane": false,
        "mark_ego_in_init": true,
        "presence_feature_name": "presence",
        "lane_feature_name": "on_lane",
        "lane_feature_fallback_name": "on_road"
      },
      "n_actions": 25,
      "n_residual_layers": 10,
      "c_puct": 2.5,
      "n_simulations": 5,
      "temperature": 1.0,
      "temperature_drop_step": null,
      "root_dirichlet_alpha": 0.3,
      "root_exploration_fraction": 0.25,
      "learning_rate": 0.001,
      "weight_decay": 0.0001,
      "batch_size": 32,
      "epochs": 10,
      "model_path": "alphazero_model (19).pth"
    },
