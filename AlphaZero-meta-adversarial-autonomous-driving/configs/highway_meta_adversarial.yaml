{
  "scenario_name": "highway_meta_adversarial",
  "environment": {
    "env_id": "highway-v0",
    "render_mode": "rgb_array",
    "config": {
      "observation": {
        "type": "MultiAgentObservation",
        "observation_config": {
          "type": "DetailedOccupancyGrid",
          "features": ["presence", "on_lane", "on_road"],
          "grid_size": [[-50, 50], [-12, 12]],
          "grid_step": [1.0, 1.0],
          "absolute": false,
          "align_to_vehicle_axes": true,
          "include_ego_vehicle": false,
          "on_road_mode": "area",
          "on_road_soft_mode": true,
          "presence_subsamples": 5,
          "on_road_subsamples": 3
        }
      },
      "action": {
        "type": "MultiAgentAction",
        "action_config": {
          "type": "DiscreteMetaAction",
          "longitudinal": true,
          "lateral": true,
          "target_speeds": [20, 25, 30]
        }
      },
      "collision_reward": 0,
      "left_lane_constraint": 0,
      "left_lane_reward": 0,
      "high_speed_reward": 0,
      "vehicles_density": 1.5,
      "success_mode": "distance",
      "terminate_on_success": true,
      "success_max_steps": null,
      "success_min_distance": null,
      "success_speed_range_fraction": 0.75,
      "success_speed_max_fraction": 0.8,
      "controlled_vehicles": 2,
      "vehicles_count": 20,
      "lanes_count": 4,
      "policy_frequency": 1,
      "duration": 40
    }
  },
  "presets": {
    "self_play": {
      "tensor": {
        "history_length": 5,
        "static_feature_names": ["presence", "on_lane", "on_road"],
        "include_self_speed_plane": true,
        "include_heading_planes": true,
        "include_progress_plane": true,
        "flip_npc_perspective": true
      },
      "zero_sum": {
        "minimum_safe_speed": 5.0
      },
      "n_actions": 5,
      "n_residual_layers": 10,
      "network_channels": 256,
      "network_dropout_p": 0.1,
      "c_puct": 1.0,
      "n_simulations": 250,
      "temperature": 1.0,
      "temperature_drop_step": 16,
      "root_dirichlet_alpha": 0.3,
      "root_exploration_fraction": 0.25,
      "relative_pruning_gamma": 0.1,
      "max_expand_actions_per_agent": 5,
      "learning_rate": 0.001,
      "weight_decay": 0.0001,
      "batch_size": 32,
      "epochs": 10,
      "replay_buffer_size": 4000,
      "warmup_episodes": 10,
      "warmup_opponent_policy": "idle",
      "warmup_collect_opponent_samples": false,
      "model_path": "models/alphazero_meta_adversarial_highway.pth"
    },
    "inference": {
      "tensor": {
        "history_length": 5,
        "static_feature_names": ["presence", "on_lane", "on_road"],
        "include_self_speed_plane": true,
        "include_heading_planes": true,
        "include_progress_plane": true,
        "flip_npc_perspective": true
      },
      "zero_sum": {
        "minimum_safe_speed": 5.0
      },
      "n_actions": 5,
      "n_residual_layers": 10,
      "network_channels": 256,
      "network_dropout_p": 0.0,
      "c_puct": 1.0,
      "n_simulations": 250,
      "temperature": 0.0,
      "temperature_drop_step": 0,
      "root_dirichlet_alpha": 0.3,
      "root_exploration_fraction": 0.0,
      "relative_pruning_gamma": 0.1,
      "max_expand_actions_per_agent": 5,
      "learning_rate": 0.001,
      "weight_decay": 0.0001,
      "batch_size": 64,
      "epochs": 10,
      "replay_buffer_size": 4000,
      "warmup_episodes": 0,
      "warmup_opponent_policy": null,
      "warmup_collect_opponent_samples": true,
      "model_path": "models/alphazero_meta_adversarial_highway.pth"
    },
    "evaluation": {
      "tensor": {
        "history_length": 5,
        "static_feature_names": ["presence", "on_lane", "on_road"],
        "include_self_speed_plane": true,
        "include_heading_planes": true,
        "include_progress_plane": true,
        "flip_npc_perspective": true
      },
      "zero_sum": {
        "minimum_safe_speed": 5.0
      },
      "n_actions": 5,
      "n_residual_layers": 10,
      "network_channels": 256,
      "network_dropout_p": 0.0,
      "c_puct": 1.0,
      "n_simulations": 250,
      "temperature": 0.0,
      "temperature_drop_step": 0,
      "root_dirichlet_alpha": 0.3,
      "root_exploration_fraction": 0.0,
      "relative_pruning_gamma": 0.1,
      "max_expand_actions_per_agent": 5,
      "learning_rate": 0.001,
      "weight_decay": 0.0001,
      "batch_size": 64,
      "epochs": 10,
      "replay_buffer_size": 4000,
      "warmup_episodes": 0,
      "warmup_opponent_policy": null,
      "warmup_collect_opponent_samples": true,
      "model_path": "models/alphazero_meta_adversarial_highway.pth"
    }
  }
}
